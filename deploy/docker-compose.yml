# PlayMatch — single-VPS stack (OVH vps2-2027, aiplaymatch.com)
# Phase 2: caddy + app + postgres. Ollama arrives in Phase 5.
services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      UPLOAD_DIR: /app/uploads
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:2b}
    volumes:
      - uploads:/app/uploads
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    environment:
      # Keep the model resident in RAM so Rally has no cold-start (~4 GB pinned;
      # the box has headroom). Default is unload after 5 min idle.
      OLLAMA_KEEP_ALIVE: "-1"
    # CPU inference; cap memory so a spike can't OOM the app/db.
    deploy:
      resources:
        limits:
          memory: 6g
    expose:
      - "11434"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: playmatch
      POSTGRES_USER: playmatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playmatch -d playmatch"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  caddy_data:
  caddy_config:
  pg_data:
  uploads:
  ollama_models:
